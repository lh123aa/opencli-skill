name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
    
    - name: Lint with py_compile
      run: |
        find scripts -name "*.py" -exec python -m py_compile {} \;
        echo "All Python files passed syntax check"
    
    - name: Run tests
      run: |
        cd tests
        python test_runner.py

  windows-test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
    
    - name: Lint with py_compile
      run: |
        Get-ChildItem -Path scripts -Filter "*.py" -Recurse | ForEach-Object { python -m py_compile $_.FullName }
        echo "All Python files passed syntax check"
    
    - name: Test CLI
      run: |
        python scripts/opencli.py --version

  macos-test:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
    
    - name: Lint with py_compile
      run: |
        find scripts -name "*.py" -exec python -m py_compile {} \;
        echo "All Python files passed syntax check"
